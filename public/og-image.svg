  </g>

  <!-- CTA -->
  <rect x="450" y="490" width="300" height="70" rx="35" fill="white" opacity="0.9"/>
  <text x="600" y="535" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#9333ea" text-anchor="middle">
