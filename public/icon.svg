<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#iconGradient)"/>

  <!-- Number "N" stylized as lottery ball -->
  <circle cx="256" cy="256" r="160" fill="white" opacity="0.95"/>

  <!-- Letter N -->
  <text x="256" y="320" font-family="Arial, sans-serif" font-size="220" font-weight="900" fill="url(#iconGradient)" text-anchor="middle">
    N
  </text>

  <!-- Small decorative circles -->
  <circle cx="140" cy="140" r="40" fill="white" opacity="0.3"/>
  <circle cx="372" cy="372" r="40" fill="white" opacity="0.3"/>

  <!-- Sparkle effect -->
  <circle cx="180" cy="180" r="8" fill="white"/>
  <circle cx="332" cy="332" r="8" fill="white"/>
  <circle cx="256" cy="120" r="6" fill="white"/>
  <circle cx="256" cy="392" r="6" fill="white"/>
</svg>
